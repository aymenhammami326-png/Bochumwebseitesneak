<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bochum – Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#2f6fff;
  --blue-dim:rgba(47,111,255,0.18);
  --blue-border:rgba(47,111,255,0.35);
  --white:#ffffff;
  --muted:rgba(255,255,255,0.38);
  --bg:#060e1c;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.09);
}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(47,111,255,0.07) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(47,111,255,0.13) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:820px;display:flex;flex-direction:column;align-items:center}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);background:var(--blue-dim);border:1px solid var(--blue-border);border-radius:100px;padding:6px 18px;margin-bottom:2rem;animation:fadeIn .6s ease both}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.city-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,16vw,148px);line-height:.88;letter-spacing:.06em;text-align:center;color:var(--white);animation:slideUp .8s cubic-bezier(.16,1,.3,1) .1s both}
.tagline{font-size:14px;font-weight:300;color:var(--muted);letter-spacing:.08em;text-align:center;margin-top:1rem;margin-bottom:2.5rem;animation:fadeIn .8s ease .4s both}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--card-border),transparent);margin:.5rem 0 2.5rem;animation:fadeIn .8s ease .5s both}
.countdown{display:flex;align-items:flex-end;gap:8px;margin-bottom:2.5rem;animation:fadeIn .8s ease .55s both}
.unit{display:flex;flex-direction:column;align-items:center;gap:8px}
.num{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,10vw,88px);line-height:1;color:var(--white);background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;width:clamp(80px,14vw,120px);text-align:center;padding:14px 8px 10px;position:relative;overflow:hidden;transition:border-color .3s}
.num.active{border-color:var(--blue-border)}
.num::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--card-border)}
.lbl{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.sep{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,72px);color:var(--blue);padding-bottom:32px;opacity:.7}
.live-msg{display:none;flex-direction:column;align-items:center;gap:12px;margin-bottom:2.5rem;animation:fadeIn .8s ease both}
.live-msg.show{display:flex}
.live-pill{font-size:13px;font-weight:500;color:#4ade80;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);border-radius:100px;padding:7px 22px;letter-spacing:.06em}
.live-link{font-size:14px;color:var(--blue);text-decoration:none;letter-spacing:.04em;border-bottom:1px solid var(--blue-border);padding-bottom:2px}
.live-link:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.sneak-label{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;animation:fadeIn .8s ease .7s both}
.previews{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;animation:fadeIn .8s ease .75s both}
.preview-card{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--card-border);aspect-ratio:16/10;cursor:pointer;transition:border-color .25s,transform .25s}
.preview-card:hover{border-color:var(--blue-border);transform:translateY(-3px)}
.preview-card img{width:100%;height:100%;object-fit:cover;filter:blur(6px) brightness(.45) saturate(.6);transform:scale(1.07);transition:filter .6s ease,transform .6s ease;display:block}
.preview-card.unlocked img{filter:none;transform:scale(1)}
.lock-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;transition:opacity .4s}
.preview-card.unlocked .lock-wrap{opacity:0;pointer-events:none}
.lock-icon{width:32px;height:32px;border-radius:50%;background:rgba(47,111,255,.2);border:1px solid rgba(47,111,255,.4);display:flex;align-items:center;justify-content:center;font-size:14px}
.lock-num{font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.5);text-transform:uppercase}
.bottom{margin-top:2.5rem;display:flex;align-items:center;gap:8px;animation:fadeIn .8s ease .9s both}
.diamond{width:12px;height:12px;background:var(--blue);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);opacity:.7}
.bottom-text{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:540px){.previews{gap:8px}.sep{display:none}.countdown{gap:6px}}
</style>
</head>

<script>
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const now=new Date();
  const target=new Date();
  target.setHours(20,0,0,0);
  const diff=target-now;
  if(diff<=0){
    document.getElementById('countdown').style.display='none';
    document.getElementById('live-msg').classList.add('show');
    ['card0','card1','card2'].forEach(id=>document.getElementById(id).classList.add('unlocked'));
    return;
  }
  const total=Math.floor(diff/1000);
  const h=Math.floor(total/3600);
  const m=Math.floor((total%3600)/60);
  const s=total%60;
  document.getElementById('h').textContent=pad(h);
  document.getElementById('m').textContent=pad(m);
  document.getElementById('s').textContent=pad(s);
  const sEl=document.getElementById('s');
  sEl.classList.add('active');
  setTimeout(()=>sEl.classList.remove('active'),400);
}
tick();
setInterval(tick,1000);
</script>
